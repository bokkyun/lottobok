<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프리미엄 로또 생성기</title>
    <style>
        /* CSS 변수 설정: 테마에 따라 색상이 변함 */
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333333;
            --btn-bg: #4A90E2;
            --btn-hover: #357ABD;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        [data-theme='dark'] {
            --bg-color: #18191a;
            --card-bg: #242526;
            --text-color: #e4e6eb;
            --btn-bg: #3a3b3c;
            --btn-hover: #4e4f50;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        .container {
            text-align: center;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px var(--shadow);
            position: relative;
        }

        /* 다크모드 토글 버튼 */
        .theme-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }

        .ball-container {
            display: flex;
            gap: 12px;
            margin: 30px 0;
            min-height: 60px;
            justify-content: center;
        }

        .ball {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 1.3rem;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.2);
            animation: bounce 0.4s ease;
        }

        @keyframes bounce {
            0% { transform: scale(0); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* 로또 공 색상 (다크모드에서도 잘 보이도록 유지) */
        .color-1 { background: linear-gradient(135deg, #fbc400, #ff9100); }
        .color-2 { background: linear-gradient(135deg, #69c8f2, #2d9cdb); }
        .color-3 { background: linear-gradient(135deg, #ff7272, #eb5757); }
        .color-4 { background: linear-gradient(135deg, #aaaaaa, #777777); }
        .color-5 { background: linear-gradient(135deg, #b0d840, #7cb342); }

        .main-btn {
            padding: 14px 30px;
            font-size: 1.1rem;
            background-color: var(--btn-bg);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s, transform 0.1s;
        }
        .main-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="container">
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌞</button>
    <h1>🍀 로또 번호 추천</h1>
    <div class="ball-container" id="ballBox">
        </div>
    <button class="main-btn" onclick="generateLotto()">새로운 번호 뽑기</button>
</div>

<script>
    // 1. 테마 전환 로직
    function toggleTheme() {
        const body = document.body;
        const themeBtn = document.getElementById('themeBtn');
        
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            themeBtn.innerText = '🌞';
            localStorage.setItem('theme', 'light');
        } else {
            body.setAttribute('data-theme', 'dark');
            themeBtn.innerText = '🌙';
            localStorage.setItem('theme', 'dark');
        }
    }

    // 페이지 로드 시 기존 테마 불러오기
    window.onload = () => {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            document.getElementById('themeBtn').innerText = '🌙';
        }
    };

    // 2. 번호 생성 로직
    function generateLotto() {
        const ballBox = document.getElementById('ballBox');
        ballBox.innerHTML = '';

        const numbers = [];
        while(numbers.length < 6) {
            const num = Math.floor(Math.random() * 45) + 1;
            if(!numbers.includes(num)) {
                numbers.push(num);
            }
        }

        numbers.sort((a, b) => a - b);

        numbers.forEach((num, index) => {
            // 시간차를 두고 공이 나타나게 설정 (애니메이션 효과)
            setTimeout(() => {
                const ball = document.createElement('div');
                ball.classList.add('ball');
                
                if (num <= 10) ball.classList.add('color-1');
                else if (num <= 20) ball.classList.add('color-2');
                else if (num <= 30) ball.classList.add('color-3');
                else if (num <= 40) ball.classList.add('color-4');
                else ball.classList.add('color-5');

                ball.innerText = num;
                ballBox.appendChild(ball);
            }, index * 100); 
        });
    }
</script>

</body>
</html>
