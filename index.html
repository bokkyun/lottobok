<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행운의 로또 생성기</title>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 { color: #333; }
        .ball-container {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            min-height: 60px;
        }
        .ball {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 1.2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        /* 로또 공 색상 규격 (참고용) */
        .color-1 { background: #fbc400; } /* 1-10 */
        .color-2 { background: #69c8f2; } /* 11-20 */
        .color-3 { background: #ff7272; } /* 21-30 */
        .color-4 { background: #aaa; }    /* 31-40 */
        .color-5 { background: #b0d840; } /* 41-45 */

        button {
            padding: 12px 24px;
            font-size: 1rem;
            background-color: #4A90E2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #357ABD; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍀 이번 주 행운의 번호</h1>
    <div class="ball-container" id="ballBox">
        </div>
    <button onclick="generateLotto()">번호 생성하기</button>
</div>

<script>
    function generateLotto() {
        const ballBox = document.getElementById('ballBox');
        ballBox.innerHTML = ''; // 기존 번호 초기화

        const numbers = [];
        while(numbers.length < 6) {
            const num = Math.floor(Math.random() * 45) + 1;
            if(!numbers.includes(num)) {
                numbers.push(num);
            }
        }

        // 오름차순 정렬
        numbers.sort((a, b) => a - b);

        // 화면에 공 그리기
        numbers.forEach(num => {
            const ball = document.createElement('div');
            ball.classList.add('ball');
            
            // 숫자에 따른 색상 부여
            if (num <= 10) ball.classList.add('color-1');
            else if (num <= 20) ball.classList.add('color-2');
            else if (num <= 30) ball.classList.add('color-3');
            else if (num <= 40) ball.classList.add('color-4');
            else ball.classList.add('color-5');

            ball.innerText = num;
            ballBox.appendChild(ball);
        });
    }
</script>

</body>
</html>
