<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또복 - 행운 번호 생성기</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Pretendard:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #212529;
            --accent-color: #ffc107;
            --btn-grad: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --shadow: rgba(0, 0, 0, 0.1);
        }

        [data-theme='dark'] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #f1f3f5;
            --btn-grad: linear-gradient(135deg, #333 0%, #444 100%);
            --shadow: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s;
        }

        /* 로고 영역 */
        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo-text {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 3.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .logo-bok {
            background: var(--accent-color);
            color: #fff;
            padding: 2px 15px;
            border-radius: 12px;
            transform: rotate(-3deg);
        }
        .subtitle { font-size: 0.8rem; opacity: 0.6; letter-spacing: 2px; margin-top: 5px; }

        /* 메인 박스 */
        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px var(--shadow);
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: 1px solid #ccc;
            border-radius: 50%;
            cursor: pointer;
            padding: 5px;
            width: 35px;
            height: 35px;
            color: var(--text-color);
        }

        /* 번호 공 스타일 */
        .ball-container {
            display: flex;
            gap: 10px;
            margin: 30px 0;
            justify-content: center;
            min-height: 60px; /* 공이 없을 때도 공간 유지 */
            flex-wrap: wrap;
        }

        .ball {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 1.2rem;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.1);
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .c1 { background: #fbc400; } .c2 { background: #69c8f2; }
        .c3 { background: #ff7272; } .c4 { background: #aaaaaa; }
        .c5 { background: #b0d840; }

        .main-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            background: var(--btn-grad);
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .main-btn:active { transform: scale(0.97); }
    </style>
</head>
<body>

    <div class="logo-area">
        <div class="logo-text">로또<span class="logo-bok">복</span></div>
        <div class="subtitle">LOTTO BOK : GET YOUR LUCK</div>
    </div>

    <div class="container">
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌞</button>
        <div class="ball-container" id="ballBox">
            <p id="placeholder" style="opacity:0.5">행운의 번호를 뽑아보세요!</p>
        </div>
        <button class="main-btn" onclick="generateLotto()">번호 생성하기</button>
    </div>

<script>
    // 테마 설정
    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeBtn');
        const isDark = body.getAttribute('data-theme') === 'dark';
        
        if (isDark) {
            body.removeAttribute('data-theme');
            btn.innerText = '🌞';
            localStorage.setItem('theme', 'light');
        } else {
            body.setAttribute('data-theme', 'dark');
            btn.innerText = '🌙';
            localStorage.setItem('theme', 'dark');
        }
    }

    // 페이지 로드시 테마 복구
    window.onload = () => {
        if (localStorage.getItem('theme') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            document.getElementById('themeBtn').innerText = '🌙';
        }
    };

    // 로또 번호 생성 핵심 로직
    function generateLotto() {
        const ballBox = document.getElementById('ballBox');
        
        // 1. 초기화
        ballBox.innerHTML = '';

        // 2. 번호 추첨 (중복 없이 6개)
        const numbers = [];
        while(numbers.length < 6) {
            const num = Math.floor(Math.random() * 45) + 1;
            if(!numbers.includes(num)) {
                numbers.push(num);
            }
        }

        // 3. 정렬
        numbers.sort((a, b) => a - b);

        // 4. 화면에 공 추가
        numbers.forEach((num, index) => {
            setTimeout(() => {
                const ball = document.createElement('div');
                ball.className = 'ball';
                
                // 색상 클래스 부여
                if (num <= 10) ball.classList.add('c1');
                else if (num <= 20) ball.classList.add('c2');
                else if (num <= 30) ball.classList.add('c3');
                else if (num <= 40) ball.classList.add('c4');
                else ball.classList.add('c5');

                ball.innerText = num;
                ballBox.appendChild(ball);
            }, index * 100); // 0.1초 간격으로 공이 나타남
        });
    }
</script>
</body>
</html>
