<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또복 - 행운의 7개 번호</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f2f5f8;
            --card-bg: #ffffff;
            --text-color: #333;
            --accent-color: #ffc107;
            --btn-grad: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --shadow: rgba(0, 0, 0, 0.1);
        }

        [data-theme='dark'] {
            --bg-color: #1a1a1b;
            --card-bg: #2d2d2e;
            --text-color: #eee;
            --btn-grad: linear-gradient(135deg, #444 0%, #222 100%);
            --shadow: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: 0.3s;
        }

        /* 로고 영역: 두께 600으로 최적화 */
        .logo-area { text-align: center; margin-bottom: 35px; }
        .logo-text {
            font-size: 3.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 800; /* 적당히 굵은 두께 */
            letter-spacing: -1px;
            margin: 0;
        }
        
        .logo-bok {
            background: var(--accent-color);
            color: #fff;
            font-weight: 800; /* '복'자는 확실히 강조 */
            padding: 2px 16px;
            border-radius: 12px;
            display: inline-block;
            animation: swingBok 2s ease-in-out infinite;
            transform-origin: top center;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.1);
            font-size: 3rem;
        }

        @keyframes swingBok {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(10deg); }
        }

        .subtitle { font-size: 0.85rem; font-weight: 400; opacity: 0.6; letter-spacing: 3px; margin-top: 5px; }

        .container {
            background: var(--card-bg);
            padding: 35px 25px;
            border-radius: 25px;
            box-shadow: 0 12px 35px var(--shadow);
            width: 90%;
            max-width: 420px;
            text-align: center;
            position: relative;
        }

        .theme-toggle {
            position: absolute; top: 15px; right: 15px;
            background: none; border: none; cursor: pointer; font-size: 1.3rem;
        }

        .ball-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 35px 0;
            flex-wrap: wrap;
            min-height: 90px;
        }

        .ball {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 1.2rem;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.15);
            animation: popIn 0.4s ease-out forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .bonus-plus { font-size: 1.4rem; font-weight: 600; margin: 0 4px; opacity: 0.4; }

        .bonus-group { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .bonus-tag { font-size: 0.7rem; font-weight: 700; color: #e67e22; letter-spacing: 1px; }

        /* 공 색상 */
        .c1 { background: #fbc400; } .c2 { background: #69c8f2; }
        .c3 { background: #ff7272; } .c4 { background: #aaaaaa; }
        .c5 { background: #b0d840; }

        .main-btn {
            width: 100%;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 15px;
            background: var(--btn-grad);
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .main-btn:active { transform: scale(0.97); }
    </style>
</head>
<body>

    <div class="logo-area">
        <div class="logo-text">로또<span class="logo-bok">복</span></div>
        <div class="subtitle">LOTTO BOK : PULL YOUR LUCK</div>
    </div>

    <div class="container">
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌞</button>
        <div class="ball-container" id="ballBox">
            <p style="opacity: 0.4;">이번 주 행운의 주인공은 당신입니다!</p>
        </div>
        <button class="main-btn" onclick="generateLotto()">행운 번호 추첨</button>
    </div>

<script>
    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeBtn');
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            btn.innerText = '🌞';
            localStorage.setItem('theme', 'light');
        } else {
            body.setAttribute('data-theme', 'dark');
            btn.innerText = '🌙';
            localStorage.setItem('theme', 'dark');
        }
    }

    if (localStorage.getItem('theme') === 'dark') {
        document.body.setAttribute('data-theme', 'dark');
        document.getElementById('themeBtn').innerText = '🌙';
    }

    function generateLotto() {
        const ballBox = document.getElementById('ballBox');
        ballBox.innerHTML = ''; 

        const allNumbers = [];
        while(allNumbers.length < 7) {
            const num = Math.floor(Math.random() * 45) + 1;
            if(!allNumbers.includes(num)) allNumbers.push(num);
        }

        const mainNumbers = allNumbers.slice(0, 6).sort((a, b) => a - b);
        const bonusNumber = allNumbers[6];

        mainNumbers.forEach((num, index) => {
            setTimeout(() => {
                const ball = createBallElement(num);
                ballBox.appendChild(ball);
            }, index * 100);
        });

        setTimeout(() => {
            const plus = document.createElement('span');
            plus.className = 'bonus-plus';
            plus.innerText = '+';
            ballBox.appendChild(plus);

            const bonusGroup = document.createElement('div');
            bonusGroup.className = 'bonus-group';
            const bonusBall = createBallElement(bonusNumber);
            const bonusTag = document.createElement('span');
            bonusTag.className = 'bonus-tag';
            bonusTag.innerText = 'BONUS';
            bonusGroup.appendChild(bonusBall);
            bonusGroup.appendChild(bonusTag);
            ballBox.appendChild(bonusGroup);
        }, 700);
    }

    function createBallElement(num) {
        const ball = document.createElement('div');
        ball.className = 'ball';
        if (num <= 10) ball.classList.add('c1');
        else if (num <= 20) ball.classList.add('c2');
        else if (num <= 30) ball.classList.add('c3');
        else if (num <= 40) ball.classList.add('c4');
        else ball.classList.add('c5');
        ball.innerText = num;
        return ball;
    }
</script>
</body>
</html>
