<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또복 - 당신의 행운 파트너</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Pretendard:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #212529;
            --accent-color: #ffc107; /* 로또 골드 */
            --btn-bg: #4A90E2;
            --shadow: rgba(0, 0, 0, 0.08);
        }

        [data-theme='dark'] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #f1f3f5;
            --btn-bg: #333;
            --shadow: rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        /* 로고 디자인 섹션 */
        .logo-area {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .logo-text {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 3.5rem;
            letter-spacing: -2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .logo-bok {
            background: var(--accent-color);
            color: #fff;
            padding: 0 15px;
            border-radius: 15px;
            transform: rotate(-3deg);
            display: inline-block;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.1);
        }

        .subtitle {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: -5px;
            letter-spacing: 2px;
        }

        .container {
            text-align: center;
            background: var(--card-bg);
            padding: 2rem 3rem;
            border-radius: 30px;
            box-shadow: 0 20px 40px var(--shadow);
            position: relative;
            max-width: 450px;
            width: 90%;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--bg-color);
            border: 1px solid #ddd;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .ball-container {
            display: flex;
            gap: 10px;
            margin: 40px 0;
            justify-content: center;
            flex-wrap: wrap;
        }

        .ball {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 1.2rem;
            box-shadow: inset -3px -3px 8px rgba(0,0,0,0.2), 3px 5px 15px rgba(0,0,0,0.1);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .color-1 { background: #fbc400; } 
        .color-2 { background: #69c8f2; } 
        .color-3 { background: #ff7272; } 
        .color-4 { background: #aaa; }    
        .color-5 { background: #b0d840; } 

        .main-btn {
            width: 100%;
            padding: 16px;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);
            transition: 0.3s;
        }
        .main-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(74, 144, 226, 0.4); }
        .main-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="logo-area">
    <div class="logo-text">로또<span class="logo-bok">복</span></div>
    <div class="subtitle">LOTTO BOK : LUCK IS YOURS</div>
</div>

<div class="container">
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌞</button>
    <div class="ball-container" id="ballBox">
        <p style="opacity: 0.5;">버튼을 눌러 행운을 확인하세요!</p>
    </div>
    <button class="main-btn" onclick="generateLotto()">행운 번호 받기</button>
</div>

<script>
    function toggleTheme() {
        const body = document.body;
        const themeBtn = document.getElementById('themeBtn');
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            themeBtn.innerText = '🌞';
            localStorage.setItem('theme', 'light');
        } else {
            body.setAttribute('data-theme', 'dark');
            themeBtn.innerText = '🌙';
            localStorage.setItem('theme', 'dark');
        }
    }

    window.onload = () => {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            document.getElementById('themeBtn').innerText = '🌙';
        }
    };

    function generateLotto() {
        const ballBox = document.getElementById('ballBox');
        ballBox.innerHTML = '';

        const numbers = [];
        while(numbers.length < 6) {
            const num = Math.floor(Math.random() * 45) + 1;
            if(!numbers.includes(num)) numbers.push(num);
        }
        numbers.sort((a, b) => a - b);
